name: CI Re-dispatch Loop

on:
  check_suite:
    types: [completed]

jobs:
  # ── Job 1: identify agent from the failing PR ────────────────────────────
  detect:
    name: Detect agent from failing check suite
    runs-on: ubuntu-latest
    outputs:
      agent:        ${{ steps.ctx.outputs.agent }}
      pr-number:    ${{ steps.ctx.outputs.pr-number }}
      issue-number: ${{ steps.ctx.outputs.issue-number }}
      repo-owner:   ${{ steps.ctx.outputs.repo-owner }}
      repo-name:    ${{ steps.ctx.outputs.repo-name }}
      ci-failures:  ${{ steps.ctx.outputs.ci-failures }}
    steps:
      - name: Checkout Hall repo (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Resolve context from check_suite event
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.hall/scripts/detect-ci-context.js')
            await fn({ github, context, core })

  # ── Job 2: retry or escalate ─────────────────────────────────────────────
  redispatch:
    name: Re-dispatch ${{ needs.detect.outputs.agent }}
    needs: [detect]
    if: needs.detect.outputs.agent != ''
    runs-on: ubuntu-latest
    environment: hall/${{ needs.detect.outputs.agent }}
    concurrency:
      group: hall-${{ needs.detect.outputs.agent }}-${{ needs.detect.outputs.issue-number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner:       ${{ needs.detect.outputs.repo-owner }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          token:      ${{ steps.app-token.outputs.token }}

      - name: Checkout Hall repo
        uses: actions/checkout@v4
        with:
          path: .hall

      - name: Read agent config
        id: agent-cfg
        env:
          AGENT: ${{ needs.detect.outputs.agent }}
        shell: bash
        run: bash .hall/scripts/read-agent-config.sh

      - name: Restore task memory
        id: memory
        uses: ./.hall/actions/memory
        with:
          mode:      restore
          repo:      ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          pr-number: ${{ needs.detect.outputs.pr-number }}

      - name: Resolve retry count
        id: retry
        env:
          MEMORY:      ${{ steps.memory.outputs.memory-json }}
          MAX_RETRIES: ${{ steps.agent-cfg.outputs.max-retries }}
        shell: bash
        run: bash .hall/scripts/resolve-retry.sh

      # ── Escalation path ───────────────────────────────────────────────────

      - name: Escalate — notify keeper on PR
        if: steps.retry.outputs.escalate == 'true'
        env:
          REPO_OWNER:   ${{ needs.detect.outputs.repo-owner }}
          REPO_NAME:    ${{ needs.detect.outputs.repo-name }}
          PR_NUMBER:    ${{ needs.detect.outputs.pr-number }}
          KEEPER:       ${{ steps.agent-cfg.outputs.keeper }}
          RETRY_COUNT:  ${{ steps.retry.outputs.count }}
          CI_FAILURES:  ${{ needs.detect.outputs.ci-failures }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/escalate-to-keeper.js')
            await fn({ github, core })

      - name: Update status card — escalated
        if: steps.retry.outputs.escalate == 'true' && needs.detect.outputs.issue-number != ''
        uses: ./.hall/actions/status-card
        with:
          app-token:    ${{ steps.app-token.outputs.token }}
          repo-owner:   ${{ needs.detect.outputs.repo-owner }}
          repo-name:    ${{ needs.detect.outputs.repo-name }}
          issue-number: ${{ needs.detect.outputs.issue-number }}
          agent:        ${{ needs.detect.outputs.agent }}
          stage:        escalated

      # ── Re-dispatch path ──────────────────────────────────────────────────

      - name: Update status card — ci-fix
        if: steps.retry.outputs.escalate != 'true' && needs.detect.outputs.issue-number != ''
        uses: ./.hall/actions/status-card
        with:
          app-token:    ${{ steps.app-token.outputs.token }}
          repo-owner:   ${{ needs.detect.outputs.repo-owner }}
          repo-name:    ${{ needs.detect.outputs.repo-name }}
          issue-number: ${{ needs.detect.outputs.issue-number }}
          agent:        ${{ needs.detect.outputs.agent }}
          stage:        ci-fix
          extra:        attempt ${{ steps.retry.outputs.new-count }} of ${{ steps.agent-cfg.outputs.max-retries }}
          pr-number:    ${{ needs.detect.outputs.pr-number }}

      - name: Inject persona and CI context
        if: steps.retry.outputs.escalate != 'true'
        env:
          AGENT:       ${{ needs.detect.outputs.agent }}
          ATTEMPT:     ${{ steps.retry.outputs.new-count }}
          MAX_RETRIES: ${{ steps.agent-cfg.outputs.max-retries }}
          PR_NUMBER:   ${{ needs.detect.outputs.pr-number }}
          CI_FAILURES: ${{ needs.detect.outputs.ci-failures }}
        shell: bash
        run: bash .hall/scripts/inject-ci-context.sh

      - name: Run agent
        id: agent
        if: steps.retry.outputs.escalate != 'true'
        uses: ./.hall/actions/dispatch
        with:
          oauth-token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token:   ${{ steps.app-token.outputs.token }}
          max-turns:   ${{ steps.agent-cfg.outputs.max-turns }}

      - name: Save updated task memory
        if: always() && steps.retry.outputs.escalate != 'true'
        uses: ./.hall/actions/memory
        with:
          mode:        save
          repo:        ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          pr-number:   ${{ needs.detect.outputs.pr-number }}
          memory-json: >-
            {
              "agent": "${{ needs.detect.outputs.agent }}",
              "issue_number": "${{ needs.detect.outputs.issue-number }}",
              "pr_number": "${{ needs.detect.outputs.pr-number }}",
              "retry_count": ${{ steps.retry.outputs.new-count }},
              "last_ci_failures": "${{ needs.detect.outputs.ci-failures }}",
              "last_review_feedback": ""
            }

      - name: Update status card — pr-opened
        if: always() && steps.retry.outputs.escalate != 'true' && needs.detect.outputs.issue-number != ''
        uses: ./.hall/actions/status-card
        with:
          app-token:    ${{ steps.app-token.outputs.token }}
          repo-owner:   ${{ needs.detect.outputs.repo-owner }}
          repo-name:    ${{ needs.detect.outputs.repo-name }}
          issue-number: ${{ needs.detect.outputs.issue-number }}
          agent:        ${{ needs.detect.outputs.agent }}
          stage:        pr-opened
          pr-number:    ${{ needs.detect.outputs.pr-number }}
