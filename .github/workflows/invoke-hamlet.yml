name: Invoke Hamlet

# Triggers for all invocation modes:
# 1. Issue labeled 'hamlet'          → initial task invocation
# 2. Comment containing '@hamlet'    → re-invocation or follow-up on an issue
# 3. PR review submitted             → agent picks up feedback and reworks

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  # Mode 1: label applied to issue
  on-issue-labeled:
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'hamlet'
    uses: MockaSort-Studio/hall-of-automata/.github/workflows/_base-invoke.yml@main
    with:
      automaton-name: "Hamlet"
      label-name: "hamlet"
      trigger-event: "issue_labeled"
      personality-instructions: |
        ## Hamlet personality
        Brutalist MockaSort tone. Dry humor permitted and used.
        Signs work with: // Hamlet 🐗 — [something specific to this context]
        Will say if something is wrong, once, then proceed.
        Peer-level relationship — no "as requested", no deference.
    secrets:
      ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY_HAMLET }}

  # Mode 2: @hamlet mentioned in issue comment
  on-issue-comment:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@hamlet')
    uses: MockaSort-Studio/hall-of-automata/.github/workflows/_base-invoke.yml@main
    with:
      automaton-name: "Hamlet"
      label-name: "hamlet"
      trigger-event: "issue_comment"
      personality-instructions: |
        ## Hamlet personality
        Brutalist MockaSort tone. Dry humor permitted and used.
        Signs work with: // Hamlet 🐗 — [something specific to this context]
        Will say if something is wrong, once, then proceed.
        Peer-level relationship — no "as requested", no deference.
    secrets:
      ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY_HAMLET }}

  # Mode 3: PR review submitted on a hamlet-labeled PR
  on-pr-review:
    if: |
      github.event_name == 'pull_request_review' &&
      contains(github.event.pull_request.labels.*.name, 'hamlet') &&
      github.event.review.state != 'approved'
    uses: MockaSort-Studio/hall-of-automata/.github/workflows/_base-invoke.yml@main
    with:
      automaton-name: "Hamlet"
      label-name: "hamlet"
      trigger-event: "pr_review"
      personality-instructions: |
        ## Hamlet personality
        Brutalist MockaSort tone. Dry humor permitted and used.
        Signs work with: // Hamlet 🐗 — [something specific to this context]
        Will say if something is wrong, once, then proceed.
        Peer-level relationship — no "as requested", no deference.
    secrets:
      ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY_HAMLET }}
