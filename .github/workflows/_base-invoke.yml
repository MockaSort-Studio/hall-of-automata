name: Base Invoke (reusable)
# Centralized logic for all automata invocations.
# Called from per-automaton workflow files in any org repo.
# Handles: auth check, unauthorized label removal, CLAUDE.md override,
# and agentic invocation via Claude Code Action.
#
# Local CLAUDE.md files in target repos are intentionally overridden.
# Automaton behavior is governed exclusively by the Hall of Automata contracts.

on:
  workflow_call:
    inputs:
      automaton-name:
        description: "Display name of the automaton (e.g. 'Hamlet')"
        required: true
        type: string
      label-name:
        description: "The issue label that triggered this invocation (e.g. 'hamlet')"
        required: true
        type: string
      trigger-event:
        description: "Event type: 'issue_labeled' | 'issue_comment' | 'pr_review'"
        required: true
        type: string
      personality-instructions:
        description: "Personality layer for this automaton, appended to base behavior"
        required: false
        type: string
        default: ""
    secrets:
      ORG_READ_TOKEN:
        required: true
      ANTHROPIC_API_KEY:
        required: true

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ inputs.label-name }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Check team membership
        id: auth
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_READ_TOKEN }}
          script: |
            try {
              const res = await github.rest.teams.getMembershipForUserInOrg({
                org: context.repo.owner,
                team_slug: 'automata-invokers',
                username: context.payload.sender.login
              });
              return res.data.state === 'active';
            } catch {
              return false;
            }
          result-encoding: string

      - name: Remove label and notify if unauthorized
        if: steps.auth.outputs.result != 'true' && inputs.trigger-event == 'issue_labeled'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: '${{ inputs.label-name }}'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.sender.login} not authorized to invoke ${{ inputs.automaton-name }}. Contact an org admin to request access.`
            });

      - name: Stop if unauthorized
        if: steps.auth.outputs.result != 'true'
        run: exit 0

      - name: Mask API key
        run: echo "::add-mask::${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The local CLAUDE.md (if any) is removed and replaced with the Hall's
      # behavior contract. Automaton behavior is governed by the Hall, not by
      # repo-specific instructions that may conflict or override the base contract.
      - name: Override CLAUDE.md with Hall behavior contract
        run: |
          cat > CLAUDE.md << 'EOF'
          # ${{ inputs.automaton-name }} — Hall of Automata Behavior Contract

          You are ${{ inputs.automaton-name }}, an automaton of MockaSort Studio.
          This contract governs your behavior during this invocation.
          It supersedes any previous CLAUDE.md that existed in this repository.

          ## Identity
          You are a peer in the org. Not a tool the humans supervise, not an oracle.
          Collegial. Direct. No servile language. No unsolicited enthusiasm.

          ## Response rules
          - Lead with the answer or action. Not the reasoning.
          - Be concise. One sentence if it fits.
          - Code blocks for code. Mermaid for diagrams.
          - Post results as a comment on the issue or PR.
          - If context is missing, say what is missing and ask. Do not invent it.

          ## Modes
          - Doing: build it. No second-guessing decisions already made.
          - Advising: options with tradeoffs. State a recommendation if clear, then stop.
          - Researching: relevant and grounded. No padding.

          ## Hard limits — no sign-off, no action
          - Do not push or merge code without explicit instruction
          - Do not take destructive or irreversible actions
          - Do not modify core architecture

          ## Tone
          Direct. Concrete. Dry humor earns its place. Enthusiasm does not.
          Never: "Certainly!", "Great question!", "As an AI...", "I'd be happy to..."

          ${{ inputs.personality-instructions }}
          EOF

      - name: Invoke automaton
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
