name: Invoke Agent

on:
  workflow_call:
    inputs:
      agent:
        description: Agent identifier (e.g. hamlet)
        required: true
        type: string
      repo-owner:
        description: Target repository owner (defaults to this org)
        required: false
        type: string
        default: ""
      repo-name:
        description: Target repository name (defaults to this repo)
        required: false
        type: string
        default: ""
      issue-number:
        description: Issue or PR number in the target repository
        required: false
        type: string
        default: ""
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  # ── Job 1: resolve invocation context ────────────────────────────────────
  detect:
    name: Detect invocation context
    runs-on: ubuntu-latest
    outputs:
      agent:         ${{ steps.ctx.outputs.agent }}
      issue-number:  ${{ steps.ctx.outputs.issue-number }}
      invoker:       ${{ steps.ctx.outputs.invoker }}
      trigger-event: ${{ steps.ctx.outputs.trigger-event }}
      repo-owner:    ${{ steps.ctx.outputs.repo-owner }}
      repo-name:     ${{ steps.ctx.outputs.repo-name }}
      pr-number:     ${{ steps.ctx.outputs.pr-number }}
      review-body:   ${{ steps.ctx.outputs.review-body }}
    steps:
      - name: Checkout Hall repo (scripts only)
        uses: actions/checkout@v4
        with:
          path: .hall
          sparse-checkout: scripts/
          sparse-checkout-cone-mode: true

      - name: Resolve invocation context
        id: ctx
        env:
          INPUT_AGENT:        ${{ inputs.agent }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
          INPUT_REPO_OWNER:   ${{ inputs.repo-owner }}
          INPUT_REPO_NAME:    ${{ inputs.repo-name }}
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.hall/scripts/detect-invoke-context.js')
            await fn({ github, context, core })

  # ── Job 2: dispatch the resolved agent ───────────────────────────────────
  dispatch:
    name: Dispatch ${{ needs.detect.outputs.agent }}
    needs: [detect]
    if: needs.detect.outputs.agent != ''
    runs-on: ubuntu-latest
    environment: hall/${{ needs.detect.outputs.agent }}
    concurrency:
      group: hall-${{ needs.detect.outputs.agent }}-${{ needs.detect.outputs.issue-number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ needs.detect.outputs.repo-owner }}

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          token:      ${{ steps.app-token.outputs.token }}

      - name: Checkout Hall repo
        uses: actions/checkout@v4
        with:
          path: .hall

      - name: Read agent config
        id: agent-cfg
        env:
          AGENT: ${{ needs.detect.outputs.agent }}
        shell: bash
        run: bash .hall/scripts/read-agent-config.sh

      - name: Read weekly counter
        id: counter
        uses: ./.hall/actions/counter
        with:
          mode: read
          agent: ${{ needs.detect.outputs.agent }}

      - name: Check cap
        id: cap
        env:
          AGENT: ${{ needs.detect.outputs.agent }}
          COUNT: ${{ steps.counter.outputs.count }}
        shell: bash
        run: bash .hall/scripts/check-weekly-cap.sh

      - name: Post cap-exceeded comment
        if: steps.cap.outputs.over-cap == 'true' && needs.detect.outputs.issue-number != ''
        env:
          REPO_OWNER:   ${{ needs.detect.outputs.repo-owner }}
          REPO_NAME:    ${{ needs.detect.outputs.repo-name }}
          ISSUE_NUMBER: ${{ needs.detect.outputs.issue-number }}
          AGENT:        ${{ needs.detect.outputs.agent }}
          CAP:          ${{ steps.cap.outputs.cap }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/post-cap-comment.js')
            await fn({ github, core })

      - name: Authorize invoker
        id: auth
        if: steps.cap.outputs.over-cap != 'true'
        uses: ./.hall/actions/authorize
        with:
          org-read-token: ${{ steps.app-token.outputs.token }}
          org:            ${{ needs.detect.outputs.repo-owner }}
          team-slug:      ${{ steps.agent-cfg.outputs.team-slug }}
          username:       ${{ needs.detect.outputs.invoker }}
          app-token:      ${{ steps.app-token.outputs.token }}
          repo-owner:     ${{ needs.detect.outputs.repo-owner }}
          repo-name:      ${{ needs.detect.outputs.repo-name }}
          issue-number:   ${{ needs.detect.outputs.issue-number }}
          trigger-event:  ${{ needs.detect.outputs.trigger-event }}
          label-name:     hall:${{ needs.detect.outputs.agent }}
          agent-name:     ${{ needs.detect.outputs.agent }}

      - name: Update status card — dispatching
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.issue-number != ''
        uses: ./.hall/actions/status-card
        with:
          app-token:     ${{ steps.app-token.outputs.token }}
          repo-owner:    ${{ needs.detect.outputs.repo-owner }}
          repo-name:     ${{ needs.detect.outputs.repo-name }}
          issue-number:  ${{ needs.detect.outputs.issue-number }}
          agent:         ${{ needs.detect.outputs.agent }}
          stage:         dispatching
          dispatched-at: ${{ github.event.created_at }}

      - name: Increment weekly counter
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true'
        id: increment
        uses: ./.hall/actions/counter
        with:
          mode:  increment
          agent: ${{ needs.detect.outputs.agent }}

      - name: Remove awaiting-input label (if present)
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.issue-number != ''
        env:
          MODE:         remove
          REPO_OWNER:   ${{ needs.detect.outputs.repo-owner }}
          REPO_NAME:    ${{ needs.detect.outputs.repo-name }}
          ISSUE_NUMBER: ${{ needs.detect.outputs.issue-number }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/manage-awaiting-label.js')
            await fn({ github, core })

      - name: Inject agent persona
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true'
        env:
          AGENT: ${{ needs.detect.outputs.agent }}
        shell: bash
        run: cp ".hall/roster/${AGENT}.md" CLAUDE.md

      - name: Restore task memory (review re-dispatch)
        id: memory
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.trigger-event == 'pr_review'
        uses: ./.hall/actions/memory
        with:
          mode:      restore
          repo:      ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          pr-number: ${{ needs.detect.outputs.pr-number }}

      - name: Append review context to CLAUDE.md
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.trigger-event == 'pr_review'
        env:
          PR_NUMBER:   ${{ needs.detect.outputs.pr-number }}
          REVIEW_BODY: ${{ needs.detect.outputs.review-body }}
        shell: bash
        run: bash .hall/scripts/append-review-context.sh

      - name: Run agent
        id: agent
        if: steps.cap.outputs.over-cap != 'true' && steps.auth.outputs.authorized == 'true'
        uses: ./.hall/actions/dispatch
        with:
          oauth-token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          app-token:   ${{ steps.app-token.outputs.token }}
          max-turns:   ${{ steps.agent-cfg.outputs.max-turns }}

      # ── Post-dispatch: find PR, save memory, update status card ───────────

      - name: Find PR opened by agent
        id: find-pr
        if: always() && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.trigger-event != 'pr_review'
        env:
          AGENT:        ${{ needs.detect.outputs.agent }}
          REPO_OWNER:   ${{ needs.detect.outputs.repo-owner }}
          REPO_NAME:    ${{ needs.detect.outputs.repo-name }}
          ISSUE_NUMBER: ${{ needs.detect.outputs.issue-number }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/find-agent-pr.js')
            await fn({ github, core })

      - name: Save task memory
        if: always() && steps.auth.outputs.authorized == 'true' && steps.find-pr.outputs.pr-number != ''
        uses: ./.hall/actions/memory
        with:
          mode:        save
          repo:        ${{ needs.detect.outputs.repo-owner }}/${{ needs.detect.outputs.repo-name }}
          pr-number:   ${{ steps.find-pr.outputs.pr-number }}
          memory-json: >-
            {
              "agent": "${{ needs.detect.outputs.agent }}",
              "issue_number": "${{ needs.detect.outputs.issue-number }}",
              "pr_number": "${{ steps.find-pr.outputs.pr-number }}",
              "branch": "${{ steps.find-pr.outputs.branch }}",
              "retry_count": 0,
              "last_ci_failures": "",
              "last_review_feedback": ""
            }

      - name: Resolve final stage
        id: final
        if: always() && steps.auth.outputs.authorized == 'true'
        env:
          TRIGGER:   ${{ needs.detect.outputs.trigger-event }}
          FIND_PR:   ${{ steps.find-pr.outputs.pr-number }}
          DETECT_PR: ${{ needs.detect.outputs.pr-number }}
          BRANCH:    ${{ steps.find-pr.outputs.branch }}
        shell: bash
        run: bash .hall/scripts/resolve-final-stage.sh

      - name: Update status card
        if: always() && steps.auth.outputs.authorized == 'true' && needs.detect.outputs.issue-number != ''
        uses: ./.hall/actions/status-card
        with:
          app-token:    ${{ steps.app-token.outputs.token }}
          repo-owner:   ${{ needs.detect.outputs.repo-owner }}
          repo-name:    ${{ needs.detect.outputs.repo-name }}
          issue-number: ${{ needs.detect.outputs.issue-number }}
          agent:        ${{ needs.detect.outputs.agent }}
          stage:        ${{ steps.final.outputs.stage }}
          pr-number:    ${{ steps.final.outputs.pr-number }}
          branch:       ${{ steps.final.outputs.branch }}

      - name: Apply awaiting-input label
        if: always() && steps.auth.outputs.authorized == 'true' && steps.final.outputs.stage == 'awaiting-input' && needs.detect.outputs.issue-number != ''
        env:
          MODE:         apply
          REPO_OWNER:   ${{ needs.detect.outputs.repo-owner }}
          REPO_NAME:    ${{ needs.detect.outputs.repo-name }}
          ISSUE_NUMBER: ${{ needs.detect.outputs.issue-number }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fn = require('./.hall/scripts/manage-awaiting-label.js')
            await fn({ github, core })

      - name: Post-dispatch audit
        if: always() && steps.auth.outputs.authorized == 'true'
        uses: ./.hall/actions/post-dispatch
        with:
          app-token:          ${{ steps.app-token.outputs.token }}
          agent:              ${{ needs.detect.outputs.agent }}
          agent-dispatched:   ${{ needs.detect.outputs.agent }}
          repo-owner:         ${{ needs.detect.outputs.repo-owner }}
          repo-name:          ${{ needs.detect.outputs.repo-name }}
          issue-number:       ${{ needs.detect.outputs.issue-number }}
          pr-number:          ${{ steps.final.outputs.pr-number }}
          invoker:            ${{ needs.detect.outputs.invoker }}
          team-validated:     ${{ steps.agent-cfg.outputs.team-slug }}
          outcome:            ${{ steps.agent.outcome || 'skipped' }}
          weekly-count-after: ${{ steps.increment.outputs.count }}
