name: Dispatch Agent
description: >
  Runs the Claude Code Action with the agent's OAuth token.
  Precondition: the calling workflow has already checked out the target repository
  and written the agent's persona to CLAUDE.md in the workspace root.

inputs:
  oauth-token:
    description: Claude OAuth token from the agent's GitHub Environment
    required: true
  app-token:
    description: GitHub App installation token (used by the action for GitHub API calls)
    required: true
  max-turns:
    description: Maximum number of agentic turns
    required: false
    default: "40"

runs:
  using: composite
  steps:
    - name: Mask OAuth token
      shell: bash
      run: echo "::add-mask::${{ inputs.oauth-token }}"

    - name: Run Claude Code Action
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.oauth-token }}
        github_token: ${{ inputs.app-token }}
        claude_args: "--max-turns ${{ inputs.max-turns }}"
