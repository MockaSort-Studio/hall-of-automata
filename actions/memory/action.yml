name: Task Memory
description: >
  Saves or restores agent task memory from Actions Cache, keyed by PR number.
  Cache key: hall-task-{repo}-{pr_number}. Expires after 7 days of inactivity.
  On restore cache-miss, the caller should pass the thread URL to the agent as
  fallback context so it can reconstruct state from the issue/PR history.

inputs:
  mode:
    description: "save | restore"
    required: true
  repo:
    description: "Repository in {owner}/{name} format"
    required: true
  pr-number:
    description: PR number this task is associated with
    required: true
  memory-json:
    description: JSON string to save (required when mode=save)
    required: false
    default: ""

outputs:
  memory-json:
    description: Restored memory JSON string (empty string on cache miss)
    value: ${{ steps.run.outputs.memory-json }}
  cache-hit:
    description: "true if the cache was restored successfully, false on miss"
    value: ${{ steps.restore.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Compute cache key
      id: key
      shell: bash
      run: |
        REPO="${{ inputs.repo }}"
        SAFE_REPO=$(echo "$REPO" | tr '/' '-')
        echo "cache-key=hall-task-${SAFE_REPO}-${{ inputs.pr-number }}" >> "$GITHUB_OUTPUT"

    - name: Restore memory cache
      id: restore
      if: inputs.mode == 'restore'
      uses: actions/cache/restore@v4
      with:
        path: .hall-memory.json
        key: ${{ steps.key.outputs.cache-key }}

    - name: Read or write memory
      id: run
      shell: bash
      run: |
        MODE="${{ inputs.mode }}"

        if [ "$MODE" = "save" ]; then
          echo '${{ inputs.memory-json }}' > .hall-memory.json

        elif [ "$MODE" = "restore" ]; then
          if [ -f .hall-memory.json ]; then
            CONTENT=$(cat .hall-memory.json)
          else
            CONTENT=""
          fi
          # Use a delimiter to safely handle multi-line JSON in GITHUB_OUTPUT
          echo "memory-json<<EOF_MEMORY" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF_MEMORY" >> "$GITHUB_OUTPUT"
        fi

    - name: Save memory cache
      if: inputs.mode == 'save'
      uses: actions/cache/save@v4
      with:
        path: .hall-memory.json
        key: ${{ steps.key.outputs.cache-key }}
